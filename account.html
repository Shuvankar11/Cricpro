<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Account - CricPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }

        /* Header Style */
        .page-header { background-color: #0b1c2d; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .back-btn { color: white; text-decoration: none; font-size: 20px; cursor: pointer; }
        .page-header h3 { font-size: 18px; font-weight: 600; }
        
        .account-container { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* --- Login Section --- */
        .login-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .login-box i.fa-circle-user { font-size: 60px; color: #0b1c2d; margin-bottom: 15px; }
        .login-box h2 { margin-bottom: 10px; color: #0b1c2d; font-size: 24px; font-weight: 700; }
        .login-box p { color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        
        .google-btn { background: #4285F4; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; font-weight: 600; box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3); transition: all 0.3s; }
        .google-btn:active { transform: scale(0.97); }
        
        /* --- Professional Profile Section --- */
        .profile-box { background: white; padding: 35px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; display: none; }
        
        .profile-header { position: relative; margin-bottom: 25px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #00d289; padding: 3px; object-fit: cover; box-shadow: 0 5px 15px rgba(0, 210, 137, 0.2); }
        .verified-badge { position: absolute; bottom: 5px; right: 35%; background: #00d289; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 12px; }
        
        .user-name { font-size: 22px; font-weight: 700; color: #0b1c2d; margin-bottom: 4px; }
        .user-email { font-size: 14px; color: #888; margin-bottom: 30px; font-weight: 500; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 15px; }
        
        .logout-btn { background: #f4f7f6; color: #0b1c2d; border: 1px solid #ddd; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logout-btn:active { background: #e2e8e5; }

        /* Delete Button UI */
        .delete-btn { background: #fff0f0; color: #ff3b30; border: 1px solid #ffcdd2; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .delete-btn:active { background: #ffe0e0; }

        #loader { display: none; margin-top: 20px; color: #4285F4; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <div class="page-header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h3>My Account</h3>
    </div>

    <div class="account-container">
        <div class="login-box" id="loginBox">
            <i class="fa-solid fa-circle-user"></i>
            <h2>CricPro Account</h2>
            <p>Apne favorite teams aur matches track karne ke liye ek secure login banayein.</p>
            <button class="google-btn" id="signInBtn">
                <i class="fa-brands fa-google"></i> Sign in with Google
            </button>
            <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i> Please wait...</div>
        </div>

        <div class="profile-box" id="profileBox">
            <div class="profile-header">
                <img src="" alt="Profile" class="profile-img" id="userPhoto">
                <div class="verified-badge"><i class="fa-solid fa-check"></i></div>
            </div>
            
            <div class="user-name" id="userName">User Name</div>
            <div class="user-email" id="userEmail">user@email.com</div>
            
            <div class="action-buttons">
                <button class="logout-btn" id="signOutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </button>
                
                <button class="delete-btn" id="deleteBtn">
                    <i class="fa-solid fa-trash-can"></i> Delete Account
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <script>
        // Aapka Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCC5u_K-CbV5wGqxS0i75MPaS1hqx2xjVU",
            authDomain: "cricpro-df6a7.firebaseapp.com",
            projectId: "cricpro-df6a7",
            storageBucket: "cricpro-df6a7.firebasestorage.app",
            messagingSenderId: "1038470520448",
            appId: "1:1038470520448:web:7e943bd7311f1a22879065"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const loginBox = document.getElementById('loginBox');
        const profileBox = document.getElementById('profileBox');
        const loader = document.getElementById('loader');

        // 1. Check Auth State (Real-time update)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Show Profile UI
                loginBox.style.display = 'none';
                profileBox.style.display = 'block';
                
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userEmail').innerText = user.email;
                
                // DP fix for clearer image (Google default DP is blurry)
                let photoUrl = user.photoURL;
                if(photoUrl) {
                    photoUrl = photoUrl.replace('=s96-c', '=s400-c'); // Make image HD
                } else {
                    photoUrl = 'https://ui-avatars.com/api/?name=' + user.displayName + '&background=00d289&color=fff';
                }
                document.getElementById('userPhoto').src = photoUrl;
                
            } else {
                // Show Login UI
                loginBox.style.display = 'block';
                profileBox.style.display = 'none';
                loader.style.display = 'none';
            }
        });

        // 2. Sign In Code
        document.getElementById('signInBtn').addEventListener('click', () => {
            loader.style.display = 'block';
            
            // Popup method is best for Netlify
            auth.signInWithPopup(provider).catch((error) => {
                loader.style.display = 'none';
                if(error.code !== 'auth/popup-closed-by-user') {
                    alert("Login failed! " + error.message);
                }
            });
        });

        // 3. Log Out Code
        document.getElementById('signOutBtn').addEventListener('click', () => {
            auth.signOut().then(() => {
                console.log("Logged Out");
            });
        });

        // 4. DELETE ACCOUNT CODE
        document.getElementById('deleteBtn').addEventListener('click', () => {
            // Confirm from user before deleting
            const confirmDelete = confirm("Warning! ⚠️\n\nKya aap sach mein apna account delete karna chahte hain? Yeh wapas recover nahi hoga.");
            
            if (confirmDelete) {
                const user = auth.currentUser;
                if (user) {
                    user.delete().then(() => {
                        alert("Aapka account successfully delete ho gaya hai.");
                        // Delete hone par onAuthStateChanged khud login screen le aayega
                    }).catch((error) => {
                        // Agar bahut time se login hai toh Firebase dubara login mangta hai delete ke liye
                        if(error.code === 'auth/requires-recent-login') {
                            alert("Security verification! Account delete karne ke liye please ek baar Log Out karke wapas Log In karein, aur phir Delete dabayein.");
                        } else {
                            alert("Error: " + error.message);
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
